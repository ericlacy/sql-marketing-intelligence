<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Lecture Environment</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{--bg:#F4F7F5;--surface:#FFFFFF;--surface2:#EEF3F0;--border:#C8D6CE;--text:#1A2E22;--text2:#4A6B55;--text3:#7A9A87;--usf-green:#00543C;--usf-green-dark:#003D2B;--usf-green-light:#007A57;--usf-gold-bright:#FDBB30;--usf-gold-pale:rgba(212,150,10,.08);--tier1:#2E6EC7;--tier1bg:rgba(46,110,199,.08);--tier2:#B8860B;--tier2bg:rgba(184,134,11,.08);--tier3:#1A8A4A;--tier3bg:rgba(26,138,74,.08);--success:#1A8A4A;--error:#C0392B;--code-bg:#F0F4F1;--step-text:white;--c-select:#2E6EC7;--c-from:#1A8A4A;--c-where:#B8860B;--c-group:#9B59B6;--c-having:#C0392B;--c-order:#2C3E50;--c-cte:#6C3483;--c-window:#2E86C1;--c-sub:#B8860B;--pill-dim:#C8D6CE}
[data-theme="dark"]{--bg:#0C1A14;--surface:#0F2219;--surface2:#153024;--border:#1E4A35;--text:#E8EDE9;--text2:#8FA99A;--text3:#5E7E6C;--usf-green:#00543C;--usf-green-dark:#003D2B;--usf-green-light:#007A57;--usf-gold-bright:#FDBB30;--usf-gold-pale:rgba(253,187,48,.12);--tier1:#5B9EEF;--tier1bg:rgba(91,158,239,.1);--tier2:#FDBB30;--tier2bg:rgba(253,187,48,.12);--tier3:#3EBF7B;--tier3bg:rgba(62,191,123,.1);--success:#3EBF7B;--error:#EF5B5B;--code-bg:#0A1610;--step-text:#0C1A14;--c-select:#5B9EEF;--c-from:#3EBF7B;--c-where:#FDBB30;--c-group:#BB86FC;--c-having:#EF5B5B;--c-order:#E8EDE9;--c-cte:#BB86FC;--c-window:#5B9EEF;--c-sub:#FDBB30;--pill-dim:#1E4A35}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
.topnav{display:flex;align-items:center;gap:8px;padding:8px 20px;background:var(--usf-green);position:sticky;top:0;z-index:50}
.topnav h1{font-size:14px;font-weight:700;color:#fff}.dtag{font-size:9px;color:var(--usf-gold-bright);background:rgba(253,187,48,.15);padding:3px 10px;border-radius:12px;font-weight:700;margin-right:auto}
.nb{padding:5px 12px;border:none;border-radius:5px;font-family:inherit;font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;background:rgba(255,255,255,.08);color:#FDBB30;transition:all .15s}.nb:hover{background:rgba(255,255,255,.15);color:#fff}.nb.a{color:#fff}
.nb.a[data-tier="1"]{background:var(--tier1)}.nb.a[data-tier="2"]{background:var(--tier2);color:var(--usf-green-dark)}.nb.a[data-tier="3"]{background:var(--tier3)}
.wbs{display:flex;gap:3px;margin-left:8px}.wb{padding:4px 10px;border:1px solid rgba(255,255,255,.2);border-radius:4px;background:transparent;color:#FDBB30;font-family:inherit;font-size:9px;font-weight:600;cursor:pointer}.wb:hover{border-color:rgba(255,255,255,.4);color:#fff}.wb.a{border-color:var(--usf-gold-bright);color:var(--usf-gold-bright);background:rgba(253,187,48,.12)}
.sep{width:1px;height:18px;background:rgba(255,255,255,.15);margin:0 6px}
.mbtn{background:none;border:1px solid rgba(255,255,255,.2);color:#fff;font-size:12px;padding:3px 8px;border-radius:5px;cursor:pointer}.mbtn:hover{background:rgba(255,255,255,.1)}
.ms{display:flex;flex-direction:column;height:calc(100vh - 41px);overflow:hidden}
.sp{background:var(--surface);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;height:280px;min-height:80px;max-height:70vh}
.sp.collapsed{height:auto;min-height:auto;max-height:auto}
.sp.collapsed .sql-body{display:none}
.sph{padding:7px 20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;flex-shrink:0}
.sph:hover{color:var(--text2)}
.sph .tog{margin-left:auto;font-size:12px;transition:transform .2s}.sp.collapsed .sph .tog{transform:rotate(180deg)}
.sql-body{display:flex;flex-direction:column;flex:1;overflow:hidden;padding:0 20px}
textarea.se{width:100%;min-height:50px;height:80px;padding:8px 10px;background:var(--code-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;resize:vertical;outline:none;tab-size:2;flex-shrink:0;margin-bottom:6px}
textarea.se:focus{border-color:var(--usf-green)}[data-theme="dark"] textarea.se:focus{border-color:var(--usf-gold-bright)}
.sc{display:flex;gap:6px;align-items:center;flex-shrink:0;margin-bottom:6px}
.sb{padding:5px 12px;border:none;border-radius:5px;font-family:inherit;font-size:10.5px;font-weight:600;cursor:pointer;transition:all .15s}
.sbr{background:var(--usf-green);color:#fff}.sbr:hover{background:var(--usf-green-light)}.sbc{background:var(--surface2);color:var(--text3)}.sbc:hover{color:var(--error)}
.sh{font-size:9px;color:var(--text3)}
.sr{flex:1;overflow:auto;border:1px solid var(--border);border-radius:6px;margin-bottom:8px;min-height:0}
.sr::-webkit-scrollbar{width:4px;height:4px}.sr::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sr table{width:100%;border-collapse:collapse}.sr th{background:var(--usf-green);color:#fff;font-size:9px;text-transform:uppercase;letter-spacing:.05em;padding:5px 8px;text-align:left;position:sticky;top:0}
[data-theme="dark"] .sr th{background:var(--usf-green-dark);color:var(--usf-gold-bright)}
.sr td{padding:3px 8px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:10.5px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr tr:hover td{background:rgba(0,84,60,.04)}[data-theme="dark"] .sr tr:hover td{background:rgba(0,84,60,.12)}
.sr .sinf{padding:12px;color:var(--text3);font-size:11px;font-style:italic}
.serr{color:var(--error);padding:6px 10px;background:rgba(192,57,43,.06);border-radius:4px;font-size:11px;margin:6px}.rct{font-size:10px;color:var(--text3);padding:2px 8px}
.drag-handle{height:6px;cursor:ns-resize;background:var(--border);flex-shrink:0;position:relative;transition:background .15s}
.drag-handle:hover,.drag-handle.active{background:var(--usf-green)}
[data-theme="dark"] .drag-handle:hover,[data-theme="dark"] .drag-handle.active{background:var(--usf-gold-bright)}
.drag-handle::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:40px;height:2px;background:var(--surface);border-radius:1px}
.lp{flex:1;overflow-y:auto;padding:24px 28px 40px;min-height:0}.lp::-webkit-scrollbar{width:4px}.lp::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.lb{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.lb.t1{background:var(--tier1bg);color:var(--tier1)}.lb.t2{background:var(--tier2bg);color:var(--tier2)}.lb.t3{background:var(--tier3bg);color:var(--tier3)}
.lt{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em}.ls{font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.ab{display:flex;gap:4px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.ap{padding:4px 10px;border-radius:14px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border:2px solid var(--pill-dim);color:var(--text3);transition:all .3s}
.ap.on{color:var(--step-text);border-color:transparent}
.ap.cs.on{background:var(--c-select)}.ap.cf.on{background:var(--c-from)}.ap.cw.on{background:var(--c-where)}.ap.cg.on{background:var(--c-group)}.ap.ch.on{background:var(--c-having)}.ap.co.on{background:var(--c-order)}
.aa{color:var(--text3);font-size:10px;margin:0 2px}
.stc{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden}
.sth{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer}
.stn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--surface2);color:var(--text3);transition:all .2s;flex-shrink:0}
.stc.on .stn{background:var(--usf-green);color:#fff}[data-theme="dark"] .stc.on .stn{background:var(--usf-gold-bright);color:var(--usf-green-dark)}
.stl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:10px;color:#fff;flex-shrink:0}
.stl.cs{background:var(--c-select)}.stl.cf{background:var(--c-from)}.stl.cw{background:var(--c-where);color:#1A2E22}.stl.cg{background:var(--c-group)}.stl.ch{background:var(--c-having)}.stl.co{background:var(--c-order)}.stl.ct{background:var(--c-cte)}.stl.cwn{background:var(--c-window)}.stl.csb{background:var(--c-sub);color:#1A2E22}
.stt{font-size:12px;font-weight:600;color:var(--text)}
.stb{padding:0 16px 14px;display:none}
.stc.on .stb{display:block}
.std{font-size:11.5px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.sts{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:8px 0;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text);line-height:1.65;white-space:pre-wrap;cursor:pointer;position:relative;transition:border-color .15s}
.sts:hover{border-color:var(--usf-green)}[data-theme="dark"] .sts:hover{border-color:var(--usf-gold-bright)}
.sts::after{content:'Click to run \2192';position:absolute;top:6px;right:10px;font-family:'DM Sans',sans-serif;font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.str{font-size:11px;color:var(--text3);margin-top:4px;font-style:italic}
.cc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:14px}
.cc h3{font-size:13px;font-weight:700;margin-bottom:6px;color:var(--usf-green)}[data-theme="dark"] .cc h3{color:var(--usf-gold-bright)}
.cc p{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:6px}.cc p:last-child{margin-bottom:0}
.co2{padding:12px 16px;border-radius:8px;margin:14px 0;font-size:11.5px;line-height:1.6}
.co2.w{background:var(--usf-gold-pale);border-left:3px solid var(--usf-gold-bright);color:var(--text)}.co2.k{background:var(--tier3bg);border-left:3px solid var(--success);color:var(--text)}.co2.d{background:rgba(192,57,43,.06);border-left:3px solid var(--error);color:var(--text)}
.co2 strong{color:var(--usf-gold-bright)}.co2.k strong{color:var(--success)}.co2.d strong{color:var(--error)}
.pb{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin:14px 0}
.pb h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--usf-green);margin-bottom:8px}[data-theme="dark"] .pb h4{color:var(--usf-gold-bright)}
.pb ol{padding-left:18px}.pb li{font-size:11.5px;color:var(--text2);margin-bottom:5px;line-height:1.5}
.sxm{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:8px 0;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text);line-height:1.65;white-space:pre-wrap;cursor:pointer;position:relative}.sxm:hover{border-color:var(--usf-green)}[data-theme="dark"] .sxm:hover{border-color:var(--usf-gold-bright)}.sxm::after{content:'Click to run \2192';position:absolute;top:6px;right:10px;font-family:'DM Sans',sans-serif;font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.sd{border:none;border-top:1px solid var(--border);margin:24px 0}
.hdn{display:none}
.rvl{display:inline-block;padding:4px 12px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--text3);font-family:inherit;font-size:10px;font-weight:600;cursor:pointer;margin-top:6px}.rvl:hover{border-color:var(--usf-green);color:var(--usf-green)}[data-theme="dark"] .rvl:hover{border-color:var(--usf-gold-bright);color:var(--usf-gold-bright)}
@media(max-width:900px){.sp{height:220px}}
.sql-warn{padding:7px 14px;border-radius:6px;font-size:11px;line-height:1.5;margin:0 0 6px 0;background:var(--usf-gold-pale);border-left:3px solid var(--usf-gold-bright);color:var(--text);display:flex;align-items:flex-start;gap:8px}.sql-warn .warn-icon{font-size:13px;flex-shrink:0;margin-top:1px}.sql-warn strong{color:var(--usf-gold-bright)}
.syn-block{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:0 0 10px 0}
.syn-title{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:6px}
.syn-code{font-family:'JetBrains Mono',monospace;font-size:10.5px;line-height:1.65;color:var(--usf-gold-bright);white-space:pre-wrap;margin-bottom:8px}
[data-theme="light"] .syn-code{color:#003D2B;font-weight:600}
.syn-clause{display:flex;gap:8px;font-size:10.5px;line-height:1.5;margin-bottom:3px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.syn-clause:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.syn-kw{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--usf-green);flex-shrink:0;min-width:90px}
[data-theme="dark"] .syn-kw{color:var(--usf-gold-bright)}
.syn-desc{color:var(--text2);flex:1}
.syn-opt{background:rgba(253,187,48,.08);border:1px dashed var(--usf-gold-bright);border-radius:8px;padding:10px 14px;margin:8px 0}
.syn-opt-label{display:inline-block;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--usf-gold-bright);background:rgba(253,187,48,.15);padding:2px 8px;border-radius:10px;margin-bottom:6px}
.syn-opt strong{display:block;font-size:11px;color:var(--text);margin-bottom:4px}
.syn-opt-body{font-size:10.5px;color:var(--text2);line-height:1.6}
.syn-opt .syn-code{color:var(--usf-gold-bright);margin:4px 0 0}
.cheat-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;backdrop-filter:blur(2px)}
.cheat-overlay.open{display:block}
.cheat-panel{position:fixed;top:0;right:0;bottom:0;width:440px;max-width:95vw;background:var(--surface);border-left:1px solid var(--border);z-index:101;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease}
.cheat-panel.open{transform:translateX(0)}
.cheat-hdr{padding:10px 16px;background:var(--usf-green);display:flex;align-items:center;gap:10px;flex-shrink:0}
.cheat-hdr h2{font-size:13px;font-weight:700;color:#fff;flex:1}
.cheat-hdr span{font-size:9px;color:var(--usf-gold-bright);background:rgba(253,187,48,.15);padding:2px 8px;border-radius:10px;font-weight:700}
.cheat-close{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;font-size:14px;width:26px;height:26px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cheat-close:hover{background:rgba(255,255,255,.15)}
.cheat-search{padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.cheat-search input{width:100%;padding:6px 10px;background:var(--code-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:11px;outline:none}
.cheat-search input:focus{border-color:var(--usf-green)}
.cheat-body{flex:1;overflow-y:auto;padding:10px 12px}
.cheat-body::-webkit-scrollbar{width:4px}.cheat-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.cheat-week{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--usf-green);padding:8px 4px 4px;border-bottom:2px solid var(--usf-green);margin-bottom:6px;margin-top:10px}
.cheat-week:first-child{margin-top:0}
.cheat-entry{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;overflow:hidden}
.cheat-entry-hdr{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;background:var(--surface2)}
.cheat-entry-hdr:hover{background:var(--code-bg)}
.cheat-entry-tag{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:10px;color:#fff;flex-shrink:0}
.cheat-entry-tag.cs{background:var(--c-select)}.cheat-entry-tag.cf{background:var(--c-from)}.cheat-entry-tag.cw{background:var(--c-where);color:#1A2E22}.cheat-entry-tag.cg{background:var(--c-group)}.cheat-entry-tag.ch{background:var(--c-having)}.cheat-entry-tag.co{background:var(--c-order)}.cheat-entry-tag.ct{background:var(--c-cte)}.cheat-entry-tag.cwn{background:var(--c-window)}.cheat-entry-tag.csb{background:var(--c-sub);color:#1A2E22}.cheat-entry-tag.fmt{background:#7D4E9E}
.cheat-entry-name{font-size:11px;font-weight:600;color:var(--text);flex:1}
.cheat-entry-body{display:none;padding:8px 12px}
.cheat-entry.open .cheat-entry-body{display:block}
.cheat-entry-code{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--usf-green);background:var(--code-bg);padding:8px 10px;border-radius:6px;white-space:pre-wrap;margin-bottom:6px;line-height:1.6;cursor:pointer}
[data-theme="dark"] .cheat-entry-code{color:var(--usf-gold-bright)}
.cheat-entry-code:hover{border:1px solid var(--usf-green)}
.cheat-clauses{margin-top:4px}
.cheat-cl{display:flex;gap:6px;font-size:10px;line-height:1.5;padding:2px 0;border-bottom:1px solid var(--border)}
.cheat-cl:last-child{border-bottom:none}
.cheat-cl-kw{font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:700;color:var(--usf-green);flex-shrink:0;min-width:80px}
[data-theme="dark"] .cheat-cl-kw{color:var(--usf-gold-bright)}
.cheat-cl-desc{color:var(--text2);flex:1}
.cheat-opt-badge{display:inline-block;font-size:8px;font-weight:700;text-transform:uppercase;color:var(--usf-gold-bright);background:rgba(253,187,48,.12);padding:1px 6px;border-radius:8px;margin-left:6px;vertical-align:middle}
.cheat-hidden{display:none}

</style>
</head>
<body>
<nav class="topnav">
<h1>SQL Lecture Environment <span style="font-size:10px;font-weight:400;opacity:.65;letter-spacing:.04em">v1.3</span></h1><span class="dtag">&#9749; Coffee Chain</span><div class="sep"></div>
<button class="nb a" data-tier="1" onclick="selT(1)">Tier 1</button>
<button class="nb" data-tier="2" onclick="selT(2)">Tier 2</button>
<button class="nb" data-tier="3" onclick="selT(3)">Tier 3</button>
<div class="wbs" id="wbs"></div><div class="sep"></div>
<button class="nb" id="spBtn" onclick="openSP()" style="background:rgba(253,187,48,.2);color:var(--usf-gold-bright)">&#9998; Scratchpad</button>
<div class="sep"></div><button class="nb" onclick="togCheat()" style="background:rgba(253,187,48,.2);color:var(--usf-gold-bright)" title="SQL Cheat Sheet">&#128196; Cheat Sheet</button><div class="sep"></div><button class="mbtn" onclick="togM()" id="mb"></button>
</nav>
<div class="ms">
<div class="sp" id="sqlPanel">
<div class="sph" onclick="document.getElementById('sqlPanel').classList.toggle('collapsed')"><span>Live SQL Editor</span><span class="sh">Ctrl+Enter to run</span><span class="tog">&#9650;</span></div>
<div class="sql-body">
<textarea class="se" id="ed" placeholder="Click any query block, or write your own..." spellcheck="false"></textarea>
<div class="sc"><button class="sb sbr" onclick="run()">&#9654; Run</button><button class="sb sbc" onclick="document.getElementById('ed').value='';document.getElementById('res').innerHTML='<p class=sinf>Results appear here.</p>'">Clear</button></div>
<div class="sr" id="res"><p class="sinf">Results appear here.</p></div>
</div>
</div>
<div class="drag-handle" id="dragHandle"></div>
<div class="lp" id="lp"></div>
</div>
<script>
let db=null;
const SCH=`CREATE TABLE members(member_id INTEGER PRIMARY KEY,name TEXT NOT NULL,email TEXT,tier TEXT,join_date TEXT,city TEXT,total_points REAL);CREATE TABLE menu_items(item_id INTEGER PRIMARY KEY,item_name TEXT NOT NULL,category TEXT,size TEXT,price REAL,calories INTEGER);CREATE TABLE locations(location_id INTEGER PRIMARY KEY,store_name TEXT NOT NULL,city TEXT,state TEXT,open_date TEXT,seating_capacity INTEGER);CREATE TABLE transactions(txn_id INTEGER PRIMARY KEY,member_id INTEGER,location_id INTEGER,txn_date TEXT,total_amount REAL,tip_amount REAL,order_type TEXT,payment_method TEXT);CREATE TABLE txn_items(id INTEGER PRIMARY KEY,txn_id INTEGER,item_id INTEGER,quantity INTEGER,unit_price REAL,customization TEXT);CREATE TABLE promotions(promo_id INTEGER PRIMARY KEY,promo_name TEXT NOT NULL,channel TEXT,start_date TEXT,end_date TEXT,budget REAL,target_tier TEXT);CREATE TABLE promo_touches(touch_id INTEGER PRIMARY KEY,promo_id INTEGER,member_id INTEGER,touch_date TEXT,response TEXT);`;
function mulberry32(seed){let t=seed;return function(){t+=0x6D2B79F5;let r=t;r=Math.imul(r^r>>>15,r|1);r^=r+Math.imul(r^r>>>7,r|61);return((r^r>>>14)>>>0)/4294967296;}}
function seed(db){
const _rng=mulberry32(0xC0FFEE42);const _ri=(a,b)=>Math.floor(_rng()*(b-a+1))+a;const tiers=['Bronze','Silver','Gold'],cities=['San Francisco','Oakland','Berkeley','San Jose','Palo Alto','Walnut Creek','Mill Valley','Sausalito','Daly City','Fremont','Hayward','Sunnyvale','Mountain View','Santa Clara','Redwood City'];const fn=['Alex','Sam','Jordan','Taylor','Morgan','Casey','Riley','Avery','Quinn','Drew','Jamie','Robin','Charlie','Sage','Kai','Reese','Skyler','Dakota','Finley','Rowan','Harper','Logan','Blake','Emery','Lennox','Peyton','Hayden','Ellis','Rory','Phoenix','Kendall','Cameron','Parker','Sawyer','River','Lane','Tatum','Marlowe','Arden','Briar','Sydney','Adrian','Devin','Jesse','Corey','Dana','Shawn','Carey','Kerry','Noel','Frankie','Harley','Ashton','Remy','Milan','Dallas','Eden','Wren','Oakley','Bellamy','Zion','Nova','Lyric','Atlas','Soren','Jules','Marley','Indie','Nico','Ari','Ezra','Maya','Leo','Ivy','Cole','Nina','Max','Stella','Felix','Leah','Oscar','Naomi','Hugo','Cora','Theo','Eliza','Milo','Vera','Silas','Clara','Jasper','Iris','Caleb','Nora','Owen','Ruby','Eli','Alice','Micah','Hazel'];const ln=['Chen','Kim','Patel','Garcia','Nguyen','Williams','Brown','Lee','Martinez','Wilson','Anderson','Taylor','Thomas','Jackson','White','Harris','Clark','Lewis','Young','Allen','Sato','Muller','Johansson','Cohen','Okafor','Santos','Nakamura','Berg','Dubois','Singh','Zhang','Park','Shah','Reyes','Tran','Lopez','Gonzalez','Hernandez','Torres','Flores','Wang','Tanaka','Larsson','Fischer','Bauer','Rossi','Costa','Moreau','Jansen','Peters','Li','Yamamoto','Andersen','Keller','Weber','Meyer','Schmidt','Bianchi','Ferreira','Bakker','Lin','Ito','Hansen','Zimmerman','Richter','Romano','Almeida','Laurent','Visser','Kato','Choi','Suzuki','Olsen','Braun','Huber','Colombo','Ribeiro','Petit','Smit','Honda','Wu','Watanabe','Nilsson','Schwarz','Steiner','Greco','Cardoso','Bernard','Meijer','Endo','Xu','Takahashi','Eriksson','Lang','Schmid','Ricci','Sousa','Leroy','Brouwer','Aoki'];const r=(a,b)=>_ri(a,b),p=a=>a[_ri(0,a.length-1)],dt=(y,m1,m2)=>{const m=r(m1,m2),d=r(1,28);return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;};const menu=[['House Drip','Coffee','Regular',2.95,5],['House Drip','Coffee','Large',3.75,10],['Cold Brew','Coffee','Regular',4.50,5],['Cold Brew','Coffee','Large',5.50,10],['Espresso','Espresso','Single',3.25,75],['Espresso','Espresso','Double',4.00,150],['Latte','Espresso','Regular',5.25,190],['Latte','Espresso','Large',6.25,250],['Cappuccino','Espresso','Regular',5.00,130],['Mocha','Espresso','Regular',5.75,290],['Mocha','Espresso','Large',6.75,370],['Chai Latte','Tea','Regular',5.00,240],['Matcha Latte','Tea','Regular',5.50,200],['Green Tea','Tea','Regular',2.75,0],['Earl Grey','Tea','Regular',2.75,0],['Croissant','Pastry','Regular',3.95,230],['Blueberry Muffin','Pastry','Regular',4.25,340],['Banana Bread','Pastry','Slice',3.50,280],['Scone','Pastry','Regular',3.75,310],['Cookie','Pastry','Regular',2.95,220],['Avocado Toast','Food','Regular',9.50,350],['Breakfast Sandwich','Food','Regular',8.25,420],['Yogurt Parfait','Food','Regular',6.50,280],['Caesar Wrap','Food','Regular',9.75,480],['Acai Bowl','Food','Regular',10.50,390]];menu.forEach((m,i)=>{db.run("INSERT INTO menu_items VALUES(?,?,?,?,?,?)",[i+1,m[0],m[1],m[2],m[3],m[4]]);});const sn=['Market St Flagship','Mission District','Castro','Inner Sunset','Hayes Valley','Downtown Oakland','Rockridge','Berkeley Main','San Jose Central','Palo Alto University','Walnut Creek Plaza','Mill Valley','Sausalito Waterfront','Daly City Hub','Fremont Station'];sn.forEach((s,i)=>{db.run("INSERT INTO locations VALUES(?,?,?,?,?,?)",[i+1,s,cities[i%cities.length],'CA',dt(r(2018,2022),1,12),r(20,80)]);});const mi=[];for(let i=1;i<=4000;i++){const nm=fn[(i-1)%fn.length]+' '+ln[Math.floor((i-1)/fn.length)%ln.length],em=nm.toLowerCase().replace(/ /g,'.')+i+'@email.com',tr=p(tiers),jd=dt(p([2021,2022,2023,2024]),1,12),ct=p(cities),pts=(r(50,12000)+r(0,99)/100).toFixed(2);db.run("INSERT INTO members VALUES(?,?,?,?,?,?,?)",[i,nm,em,tr,jd,ct,pts]);mi.push(i);if(i%267===0)db.run("INSERT INTO members VALUES(?,?,?,?,?,?,?)",[4000+Math.floor(i/267),nm,em.replace('@','+dup@'),tr,jd,ct,pts]);}const pn=['Happy Hour','Double Points','BOGO Espresso','Free Pastry Friday','Loyalty Launch','Summer Chill','Fall Favorites','Holiday Warmth','New Year Boost','Referral Bonus','App Exclusive','Birthday Reward','Morning Rush','Afternoon Pick-Up','Weekend Brunch','Flash Sale','Seasonal Intro','Comeback Offer','Gold Member Perk','Community Day'];const pc=['email','push_notification','in_app','sms','social'];for(let i=1;i<=20;i++){const ch=p(pc),tr=p(tiers),yr=p([2023,2024]),sm=r(1,10),sd=dt(yr,sm,sm);let em=r(sm+1,12),ey=yr;if(em>12){em-=12;ey=yr+1;}const ed=`${ey}-${String(em).padStart(2,'0')}-${String(r(1,28)).padStart(2,'0')}`;if(i===8)db.run("INSERT INTO promotions VALUES(?,?,?,?,?,?,?)",[i,pn[i-1],ch,ed,sd,r(3000,50000),tr]);else db.run("INSERT INTO promotions VALUES(?,?,?,?,?,?,?)",[i,pn[i-1],ch,sd,ed,r(3000,50000),tr]);}const ot=['dine_in','takeout','mobile','drive_thru'],pm=['credit','debit','mobile','cash'];for(let i=1;i<=15000;i++){const mid=p(mi),lid=r(1,15),td=dt(p([2023,2024]),1,12),amt=(r(3,25)+r(0,99)/100).toFixed(2),tip=_rng()<0.25?null:(r(0,5)+r(0,99)/100).toFixed(2);db.run("INSERT INTO transactions VALUES(?,?,?,?,?,?,?,?)",[i,mid,lid,td,amt,tip,p(ot),p(pm)]);}for(let i=15001;i<=15040;i++)db.run("INSERT INTO transactions VALUES(?,?,?,?,?,?,?,?)",[i,r(8001,8040),r(1,15),dt(p([2023,2024]),1,12),(r(3,25)+r(0,99)/100).toFixed(2),null,p(ot),p(pm)]);let tiId=1;const cust=[null,null,null,'oat milk','extra shot','no foam','almond milk','half-sweet','decaf','iced',null,null,'soy milk',null,'light ice'];for(let o=1;o<=15040;o++){const n=r(1,4);for(let j=0;j<n;j++)db.run("INSERT INTO txn_items VALUES(?,?,?,?,?,?)",[tiId++,o,r(1,25),r(1,3),(r(2,10)+r(0,99)/100).toFixed(2),p(cust)]);}for(let i=1;i<=40000;i++)db.run("INSERT INTO promo_touches VALUES(?,?,?,?,?)",[i,r(1,20),p(mi),dt(p([2023,2024]),1,12),p(['redeemed','clicked','viewed','ignored','ignored','ignored','viewed','clicked'])]);for(let i=40001;i<=40080;i++)db.run("INSERT INTO promo_touches VALUES(?,?,?,?,?)",[i,r(1,20),r(8001,8040),dt(p([2023,2024]),1,12),p(['redeemed','clicked','viewed','ignored'])]);}

function lintSQL(sql){const w=[];let up=sql.toUpperCase().replace(/--[^\n]*/g,'').replace(/'[^']*'/g,"''");if(/\bUNION\b/i.test(up))up=up.split(/\bUNION\b/i)[0];const aggs=/\b(COUNT|SUM|AVG|MIN|MAX)\s*\(/i;const hasGroupBy=/\bGROUP\s+BY\b/i.test(up);const hasAgg=aggs.test(up);if(hasAgg&&!hasGroupBy){const selM=up.match(/\bSELECT\b([\s\S]*?)\bFROM\b/i);if(selM){let cl=selM[1];for(let i=0;i<5;i++)cl=cl.replace(/\b\w+\s*\([^()]*\)/gi,'');cl=cl.replace(/\bCASE\b[\s\S]*?\bEND\b/gi,'').replace(/\bAS\s+\w+/gi,'');const cols=cl.split(',').map(c=>c.trim()).filter(c=>c&&c!=='*'&&!/^\d+$/.test(c)&&!/^'/.test(c)&&c.length>0);if(cols.length>0)w.push('Aggregate function without GROUP BY \u2014 non-aggregated columns may return arbitrary values. Add GROUP BY for each non-aggregated column in SELECT.');}}if(/\bHAVING\b/i.test(up)&&!hasGroupBy)w.push('HAVING without GROUP BY \u2014 HAVING filters grouped results. Did you mean WHERE?');if(/\bWHERE\b/i.test(up)&&hasGroupBy){const wm=up.match(/\bWHERE\b([\s\S]*?)(?:\bGROUP\b)/i);if(wm&&aggs.test(wm[1]))w.push('Aggregate function in WHERE \u2014 aggregates cannot be used in WHERE. Use HAVING instead.');}return w;}

function fmtW(warnings){return warnings.map(w=>`<div class="sql-warn"><span class="warn-icon">\u26A0</span><div>${w}</div></div>`).join('');}
function run(){document.getElementById('sqlPanel').classList.remove('collapsed');const sql=document.getElementById('ed').value.trim(),a=document.getElementById('res');if(!sql){a.innerHTML='<p class="sinf">Enter a query.</p>';return;}try{const res=db.exec(sql);if(!res.length){a.innerHTML='<p class="sinf">Executed. No rows.</p>';return;}const{columns,values}=res[0];let h='<table><thead><tr>';columns.forEach(c=>{h+=`<th>${esc(c)}</th>`;});h+='</tr></thead><tbody>';const s=Math.min(values.length,200);for(let i=0;i<s;i++){h+='<tr>';values[i].forEach(v=>{h+=`<td>${v===null?'<span style="opacity:.35">NULL</span>':esc(String(v))}</td>`;});h+='</tr>';}h+='</tbody></table>';h+=`<p class="rct">${values.length} row${values.length!==1?'s':''}${values.length>200?' (200 shown)':''}</p>`;const _lw=lintSQL(sql);a.innerHTML=fmtW(_lw)+h;}catch(e){a.innerHTML=`<div class="serr"><strong>Error:</strong> ${esc(e.message)}</div>`;}}
function lr(el){document.getElementById('sqlPanel').classList.remove('collapsed');document.getElementById('ed').value=el.textContent.trim();document.getElementById('ed').focus();run();}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function togM(){const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);document.getElementById('mb').textContent=t==='dark'?'\u2600\uFE0F':'\uD83C\uDF19';try{localStorage.setItem('lec_theme',t);}catch(e){}}
function togS(el){el.closest('.stc').classList.toggle('on');}

function abar(on){const cls=[['cs','SELECT'],['cf','FROM / JOIN'],['cw','WHERE'],['cg','GROUP BY'],['ch','HAVING'],['co','ORDER BY']];return'<div class="ab">'+cls.map((c,i)=>{const a=on.includes(c[0])?'on':'';const ar=i<cls.length-1?'<span class="aa">\u2192</span>':'';return`<span class="ap ${c[0]} ${a}">${c[1]}</span>${ar}`;}).join('')+'</div>';}

function sc(n,clause,cls,title,desc,sql,hint,open){return`<div class="stc${open?' on':''}"><div class="sth" onclick="togS(this)"><span class="stn">${n}</span><span class="stl ${cls}">${clause}</span><span class="stt">${title}</span></div><div class="stb"><p class="std">${desc}</p><div class="sts" onclick="lr(this)">${sql}</div>${hint?`<p class="str">\u2192 ${hint}</p>`:''}</div></div>`;}

function syn(code, clauses){
  const cls = clauses.map(c=>`<div class="syn-clause"><span class="syn-kw">${c[0]}</span><span class="syn-desc">${c[1]}</span></div>`).join('');
  return `<div class="syn-block"><div class="syn-title">Syntax</div><div class="syn-code">${code}</div><div>${cls}</div></div>`;
}
function opt(title, codeLines, desc){
  const codeHTML = codeLines.map(l=>`<div class="syn-code" style="margin-bottom:4px">${l}</div>`).join('');
  return `<div class="syn-opt"><span class="syn-opt-label">Optional Enhancement</span><strong>${title}</strong><div class="syn-opt-body">${desc}${codeHTML}</div></div>`;
}
function togCheat(){
  const p=document.getElementById('cheatPanel'),o=document.getElementById('cheatOverlay');
  const open=p.classList.toggle('open');
  o.classList.toggle('open',open);
  if(open&&!document.getElementById('cheatBody').children.length) buildCheat();
}
function filterCheat(q){
  q=q.toLowerCase().trim();
  document.querySelectorAll('.cheat-entry').forEach(e=>{
    const txt=(e.querySelector('.cheat-entry-name').textContent+e.querySelector('.cheat-entry-code').textContent).toLowerCase();
    e.classList.toggle('cheat-hidden',q&&!txt.includes(q));
  });
  document.querySelectorAll('.cheat-week').forEach(w=>{
    const entries=w.nextElementSibling?[...document.querySelectorAll('.cheat-entry')].filter(e=>e.previousElementSibling===w||e===w.nextElementSibling):[];
  });
}
function togCheatEntry(el){el.closest('.cheat-entry').classList.toggle('open');}
function runCheatSQL(el){
  const code=el.textContent.trim();
  document.getElementById('sqlPanel').classList.remove('collapsed');
  document.getElementById('ed').value=code;
  document.getElementById('ed').focus();
  run();
  togCheat();
}

// ── Cheat Sheet Data ──────────────────────────────────────────────
const CHEAT=[
{week:'Week 1 — Foundations',entries:[
{tag:'cs',name:'SELECT … FROM … LIMIT',
 code:`SELECT [* | column [, column ...]]
FROM   table_name
[LIMIT  n]`,
 clauses:[
  ['SELECT','Columns to return. * returns all columns.',],
  ['FROM','The source table.',],
  ['LIMIT','Optional. Caps the number of rows returned. Useful for exploring schema.',]
]},
{tag:'cf',name:'INNER JOIN … ON',
 code:`SELECT t1.col, t2.col
FROM   table1 t1
INNER JOIN table2 t2
  ON t1.foreign_key = t2.primary_key`,
 clauses:[
  ['INNER JOIN','Returns only rows where the ON condition matches in BOTH tables. Non-matching rows (orphans) are silently dropped.',],
  ['ON','The join condition. Always matches a FK in one table to a PK in the other. Read this from the ER diagram.',],
  ['Alias','Short name (t1, t2) placed after table name. Required when joining a table to itself; good practice always.',]
]},
{tag:'cf',name:'LEFT JOIN … ON … WHERE … IS NULL',
 code:`SELECT t1.col, t2.col
FROM   table1 t1
LEFT JOIN table2 t2
  ON t1.foreign_key = t2.primary_key
[WHERE t2.primary_key IS NULL]`,
 clauses:[
  ['LEFT JOIN','Returns ALL rows from the left table. Fills NULLs where no match exists in the right table.',],
  ['ON','Same join condition as INNER JOIN.',],
  ['WHERE … IS NULL','Added after LEFT JOIN to isolate unmatched rows only (orphan detection pattern).',]
]},
{tag:'cw',name:'WHERE (conditions + LIKE)',
 code:`WHERE condition [AND | OR condition ...]
-- Text match
WHERE col LIKE 'prefix%'
WHERE col LIKE '%substring%'
WHERE col LIKE 'A_C'`,
 clauses:[
  ['WHERE','Filters rows BEFORE grouping. NULLs evaluate as UNKNOWN (not TRUE or FALSE) so NULL comparisons must use IS NULL / IS NOT NULL.',],
  ['AND / OR','AND requires both conditions true. OR requires either.',],
  ['LIKE','Case-insensitive text pattern match. Use with % (any sequence) or _ (single character).',],
  ['%','Wildcard: matches zero or more characters. % at start and end = contains.',],
  ['_','Wildcard: matches exactly one character.',]
]},
{tag:'cs',name:'UPPER() / LOWER() — case-safe comparison',
 code:`WHERE UPPER(city) = 'SAN FRANCISCO'
WHERE LOWER(email) LIKE '%@gmail%'`,
 clauses:[
  ['UPPER(col)','Converts col to uppercase. Use to normalise mixed-case data before comparison.',],
  ['LOWER(col)','Converts col to lowercase.',],
  ['Optional','These are formatting/normalisation helpers. Not required when data is already consistently cased.',]
],opt:true},
{tag:'co',name:'ORDER BY',
 code:`ORDER BY column [ASC | DESC]
       [, column [ASC | DESC] ...]`,
 clauses:[
  ['ORDER BY','Sorts the result set. Applied after WHERE, GROUP BY, and HAVING.',],
  ['ASC','Ascending order (lowest first). Default if omitted.',],
  ['DESC','Descending order (highest first).',],
  ['Multiple cols','Secondary sort applied when the first column has ties: ORDER BY tier, total_points DESC',]
]},
{tag:'cw',name:'NULL behavior',
 code:`-- IS NULL detects missing values
WHERE col IS NULL
WHERE col IS NOT NULL
-- COALESCE replaces NULL with a default
COALESCE(col, 0)
COALESCE(col, 'Unknown')`,
 clauses:[
  ['IS NULL','The only correct way to test for NULL. NULL = NULL evaluates as UNKNOWN, not TRUE.',],
  ['IS NOT NULL','Returns rows where the column has a value.',],
  ['COALESCE','Returns the first non-NULL argument. Use to substitute a default value.',]
]}
]},
{week:'Week 2 — Connecting Tables',entries:[
{tag:'cf',name:'Multi-table JOIN chain',
 code:`SELECT a.col, b.col, c.col
FROM   table_a a
JOIN   table_b b ON a.id = b.a_id
JOIN   table_c c ON b.id = c.b_id`,
 clauses:[
  ['Chain JOINs','Each JOIN adds one more table. Follow the ER diagram path left to right.',],
  ['Alias','Prefix each column with its table alias to avoid ambiguous column name errors.',],
  ['Order','Start FROM the table closest to your answer. Join outward following FK arrows.',]
]},
{tag:'cf',name:'LEFT JOIN orphan detection',
 code:`SELECT t.txn_id, t.member_id
FROM   transactions t
LEFT JOIN members m
  ON t.member_id = m.member_id
WHERE  m.member_id IS NULL`,
 clauses:[
  ['Pattern','Flip the table on the left to change which side keeps all rows.',],
  ['WHERE IS NULL','Isolates the non-matching (orphan) rows after the LEFT JOIN.',],
  ['Business meaning','~40 transactions exist for deleted or invalid accounts. INNER JOIN hides all of them.',]
]}
]},
{week:'Week 3 — Aggregation & KPIs',entries:[
{tag:'cg',name:'GROUP BY + aggregate functions',
 code:`SELECT  col, COUNT(*), COUNT(DISTINCT col2),
        AVG(col3), SUM(col4), MIN(col5), MAX(col6)
FROM    table
[WHERE  condition]
GROUP BY col`,
 clauses:[
  ['GROUP BY','Collapses all rows with the same value into one summary row.',],
  ['COUNT(*)','Counts every row in the group, including NULLs.',],
  ['COUNT(DISTINCT col)','Counts unique non-NULL values. Use to avoid fan-out inflation from JOINs.',],
  ['AVG(col)','Mean of non-NULL values. NULLs are excluded from both numerator and denominator.',],
  ['SUM(col)','Total of non-NULL values.',],
  ['MIN / MAX','Smallest / largest non-NULL value.',]
]},
{tag:'cs',name:'ROUND() + printf() formatting',
 code:`ROUND(value, decimal_places)
-- Optional display formatting (SQLite)
printf('$%.2f', value)    -- $12.50
printf('%.1f%%', value)   -- 43.2%`,
 clauses:[
  ['ROUND(v, n)','Rounds v to n decimal places. n=2 for currency, n=4 for rates.',],
  ['printf(fmt, v)','SQLite string formatting. Use for display only — do not sort or filter on printf output.',],
  ['$%.2f','$ literal + %.2f = two decimal float.',],
  ['%.1f%%','One decimal float + % sign (escaped as %% in printf).',]
],opt:true},
{tag:'cs',name:'CASE WHEN … THEN … ELSE … END',
 code:`CASE WHEN condition THEN value
     [WHEN condition THEN value ...]
     [ELSE default_value]
END`,
 clauses:[
  ['CASE WHEN','Evaluates conditions in order. Returns the value for the FIRST matching WHEN.',],
  ['ELSE','Optional fallback. Without ELSE, unmatched rows return NULL.',],
  ['Inside COUNT','COUNT(CASE WHEN x THEN 1 END) counts rows where condition is true.',],
  ['Inside SUM','SUM(CASE WHEN x THEN value ELSE 0 END) — ELSE 0 prevents NULL from propagating.',]
]},
{tag:'cs',name:'Integer division fix',
 code:`-- Wrong: integer / integer = integer
SELECT 3 / 4;           -- returns 0
-- Fix option 1: multiply by 1.0
SELECT 1.0 * 3 / 4;    -- returns 0.75
-- Fix option 2: CAST (explicit, preferred)
SELECT CAST(3 AS REAL) / 4;`,
 clauses:[
  ['Integer division','SQLite divides integers and truncates the decimal. Always produces 0 for values < 1.',],
  ['1.0 *','Cheapest fix. Forces float arithmetic by making the first operand a float.',],
  ['CAST(v AS REAL)','More explicit and readable. Preferred in production code.',],
  ['CAST(v AS TEXT)','Converts a number to its string representation.',]
],opt:true},
{tag:'ch',name:'HAVING',
 code:`SELECT col, aggregate_fn(col2)
FROM   table
GROUP BY col
HAVING aggregate_fn(col2) > threshold`,
 clauses:[
  ['HAVING','Filters AFTER grouping. Operates on aggregate results, not on individual rows.',],
  ['vs WHERE','WHERE filters rows before grouping. HAVING filters groups after aggregation. They are not interchangeable.',],
  ['Rule','Any condition using an aggregate function (COUNT, SUM, AVG…) must go in HAVING, never WHERE.',]
]}
]},
{week:'Week 4 — Subqueries & Comparisons',entries:[
{tag:'csb',name:'Derived table (subquery in FROM)',
 code:`SELECT outer.col, sub.col
FROM   outer_table outer
JOIN (
  SELECT key_col, aggregate_fn(col) AS alias
  FROM   inner_table
  GROUP BY key_col
) sub ON outer.key_col = sub.key_col`,
 clauses:[
  ['Subquery in FROM','Any SELECT can be wrapped in parentheses and used as a table source. Must be aliased.',],
  ['Use case','Calculate per-group aggregates, then JOIN them back to individual rows for comparison.',],
  ['Execution order','The inner query (sub) runs first. Outer query then reads its result as a table.',]
]},
{tag:'cs',name:'SUM(CASE WHEN) pivot + BETWEEN',
 code:`SELECT  group_col,
  SUM(CASE WHEN col BETWEEN start AND end THEN value ELSE 0 END) AS period_1,
  SUM(CASE WHEN col BETWEEN start AND end THEN value ELSE 0 END) AS period_2
FROM table
GROUP BY group_col`,
 clauses:[
  ['Pivot pattern','Creates side-by-side period columns from a single date column. No JOIN needed.',],
  ['BETWEEN x AND y','Inclusive range filter. Equivalent to col >= x AND col <= y.',],
  ['ELSE 0','Critical: without ELSE 0, rows outside the condition contribute NULL, which propagates through SUM.',]
]}
]},
{week:'Week 5 — Advanced Patterns',entries:[
{tag:'cwn',name:'RANK() OVER (PARTITION BY … ORDER BY …)',
 code:`RANK() OVER (
  [PARTITION BY partition_col, ...]
   ORDER BY sort_col [ASC | DESC]
)`,
 clauses:[
  ['RANK()','Assigns a rank number within each partition. Tied values get the same rank; next rank skips (1,1,3…).',],
  ['OVER','Required keyword that opens the window function clause.',],
  ['PARTITION BY','Resets the rank counter for each unique value of partition_col. Omit for a global rank.',],
  ['ORDER BY','Determines sort direction for ranking within each partition.',],
  ['DENSE_RANK()','Alternative: no rank gaps after ties (1,1,2…). Use when gaps would be confusing.',]
]},
{tag:'cwn',name:'NTILE(n) OVER (PARTITION BY … ORDER BY …)',
 code:`NTILE(number_of_buckets) OVER (
  [PARTITION BY partition_col, ...]
   ORDER BY sort_col [ASC | DESC]
)`,
 clauses:[
  ['NTILE(n)','Divides rows into n equal-sized buckets. Returns bucket number 1 through n.',],
  ['PARTITION BY','Optional. Resets buckets per group.',],
  ['ORDER BY','Required. Determines which rows go into which bucket.',],
  ['Filter on result','Cannot use WHERE on NTILE in the same SELECT. Must wrap in a subquery: SELECT * FROM (...) WHERE ntile_col = 1',]
]},
{tag:'csb',name:'Subquery wrapper for window filter',
 code:`SELECT *
FROM (
  SELECT col,
         NTILE(10) OVER (
           PARTITION BY tier
           ORDER BY total_points DESC
         ) AS decile
  FROM members
) ranked
WHERE decile = 1`,
 clauses:[
  ['Why wrap?','Window functions are computed in the SELECT phase. WHERE is evaluated before SELECT, so you cannot filter on a window result in the same query.',],
  ['Pattern','Compute the window in an inner query. Filter in the outer query WHERE clause.',]
]},
{tag:'ct',name:'WITH … AS (CTE)',
 code:`WITH cte_name AS (
  SELECT col, aggregate_fn(col2) AS alias
  FROM   table
  [WHERE condition]
  GROUP BY col
)
SELECT cte_name.col, cte_name.alias
FROM   cte_name
[ORDER BY col]`,
 clauses:[
  ['WITH','Opens the CTE definition. Can define multiple CTEs separated by commas: WITH a AS (...), b AS (...)',],
  ['AS (…)','The subquery that defines the CTE. Executes before the main SELECT.',],
  ['Purpose','Breaks complex queries into named, readable steps. Especially useful for time-series: build monthly totals first, then add LAG.',],
  ['Scope','The CTE name is available only within the same query. It is not stored permanently.',]
]},
{tag:'cwn',name:'LAG() OVER (ORDER BY …)',
 code:`LAG(col [, offset [, default]]) OVER (
  [PARTITION BY partition_col]
   ORDER BY sort_col
)`,
 clauses:[
  ['LAG(col)','Returns the value of col from the previous row in the window order.',],
  ['offset','Optional. Number of rows back to look. Default is 1.',],
  ['default','Optional. Value returned when there is no previous row (first row). Default is NULL.',],
  ['NULL on first row','The first row has no prior row. LAG() returns NULL — this is correct. Do NOT COALESCE to 0 (causes division by zero in growth calculations).',],
  ['LEAD(col)','The forward-looking equivalent: returns the value from the next row.',]
]},
{tag:'cs',name:'strftime() — date formatting',
 code:`strftime('%Y-%m', date_col)      -- '2024-03'
strftime('%Y', date_col)         -- '2024'
strftime('%m', date_col)         -- '03'
-- Optional: human-readable month
strftime('%B %Y', date_col)      -- 'March 2024'`,
 clauses:[
  ['strftime(fmt, col)','SQLite date formatting function. Returns a string.',],
  ['%Y-%m','ISO year-month. Best for GROUP BY — sorts correctly as a string.',],
  ['%B','Full month name. Use for display only — does not sort chronologically.',],
  ['GROUP BY','Always GROUP BY the same strftime() expression used in SELECT, not the display version.',]
],opt:true}
]},
{week:'Week 6 — Data Quality Audit',entries:[
{tag:'cs',name:'COALESCE()',
 code:`COALESCE(value1, value2 [, ...])
-- Replace NULL with 0
AVG(COALESCE(tip_amount, 0))
-- Replace NULL with label
COALESCE(city, 'Unknown')`,
 clauses:[
  ['COALESCE','Returns the first non-NULL argument in the list.',],
  ['AVG(COALESCE(x, 0))','Treats NULLs as zero. Increases the denominator vs AVG(x) which excludes NULLs. Document which you choose.',],
  ['NULL impact','AVG(x) and AVG(COALESCE(x, 0)) often return different values. The difference reveals how many NULLs exist.',]
]},
{tag:'ch',name:'HAVING COUNT(*) > 1 — duplicate detection',

FROM   table
GROUP BY col
HAVING COUNT(*) > 1
ORDER BY n DESC`,
 clauses:[
  ['HAVING COUNT(*) > 1','Keeps only groups with more than one row — i.e. duplicates.',],
  ['GROUP_CONCAT(col)','Concatenates values within a group into a comma-separated string. Useful to list the duplicate IDs.',],
  ['TRIM() — optional','TRIM(col) removes leading/trailing whitespace. Near-duplicates caused by spaces will not match without it.',],
  ['LENGTH(col) — optional','LENGTH(col) returns the number of characters. Flag suspiciously short (< 2) or long (> 100) values as data quality issues.',]
]},
{tag:'cw',name:'Date anomaly detection',

WHERE start_date > end_date

WHERE date_col > date('now')

  ['date(\'now\')','SQLite function returning today\'s date as \'YYYY-MM-DD\'.',],
  ['Pattern','Any logical impossibility in date fields can be expressed as a WHERE condition.',]
]},
{tag:'cs',name:'UNION ALL — multi-check audit',
 code:`SELECT 'label_1' AS issue, COUNT(*) AS n
FROM   table WHERE condition_1
UNION ALL
SELECT 'label_2', COUNT(*)
FROM   table WHERE condition_2
UNION ALL
SELECT 'label_3', COUNT(*)
FROM   table WHERE condition_3`,
 clauses:[

function buildCheat(){
  const body=document.getElementById('cheatBody');
  let html='';
  CHEAT.forEach(section=>{
    html+=`<div class="cheat-week">${section.week}</div>`;
    section.entries.forEach(e=>{
      const opt=e.opt?`<span class="cheat-opt-badge">Optional</span>`:'';
      const clauses=e.clauses.map(c=>`<div class="cheat-cl"><span class="cheat-cl-kw">${c[0]}</span><span class="cheat-cl-desc">${c[1]}</span></div>`).join('');
      html+=`<div class="cheat-entry"><div class="cheat-entry-hdr" onclick="togCheatEntry(this)"><span class="cheat-entry-tag ${e.tag}">${e.tag.replace('cwn','WINDOW').replace('csb','SUBQUERY').replace('ct','CTE').replace('cs','SELECT').replace('cf','FROM/JOIN').replace('cw','WHERE').replace('cg','GROUP BY').replace('ch','HAVING').replace('co','ORDER BY').replace('fmt','FORMAT').toUpperCase()}</span><span class="cheat-entry-name">${e.name}${opt}</span></div><div class="cheat-entry-body"><div class="cheat-entry-code" onclick="runCheatSQL(this)" title="Click to run in editor">${e.code}</div><div class="cheat-clauses">${clauses}</div></div></div>`;
    });
  });
  body.innerHTML=html;
}

${sc(3,'CARDINALITY','cf','Read the crow\'s feet',
'Crow\'s foot notation uses symbols at each end of the line. <strong>Double bar ||</strong> = exactly one. <strong>Fork &gt;</strong> = many. <strong>Circle + bar O|</strong> = zero or one (orphans possible). Read it left to right: one member \u2192 many transactions. The fork always points at the "many" table.',
