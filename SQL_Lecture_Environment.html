<style>
:root,[data-theme="light"]{--bg:#F4F7F5;--surface:#FFFFFF;--surface2:#EEF3F0;--border:#C8D6CE;--text:#1A2E22;--text2:#4A6B55;--text3:#7A9A87;--usf-green:#00543C;--usf-green-dark:#003D2B;--usf-green-light:#007A57;--usf-gold-bright:#FDBB30;--usf-gold-pale:rgba(212,150,10,.08);--tier1:#2E6EC7;--tier1bg:rgba(46,110,199,.08);--tier2:#B8860B;--tier2bg:rgba(184,134,11,.08);--tier3:#1A8A4A;--tier3bg:rgba(26,138,74,.08);--success:#1A8A4A;--error:#C0392B;--code-bg:#F0F4F1;--step-text:white;--c-select:#2E6EC7;--c-from:#1A8A4A;--c-where:#B8860B;--c-group:#9B59B6;--c-having:#C0392B;--c-order:#2C3E50;--c-cte:#6C3483;--c-window:#2E86C1;--c-sub:#B8860B;--pill-dim:#C8D6CE}

*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}

textarea.se{width:100%;min-height:50px;height:80px;padding:8px 10px;background:var(--code-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.6;resize:vertical;outline:none;tab-size:2;flex-shrink:0;margin-bottom:6px}

.sc{display:flex;gap:6px;align-items:center;flex-shrink:0;margin-bottom:6px}

.sbr{background:var(--usf-green);color:#fff}.sbr:hover{background:var(--usf-green-light)}.sbc{background:var(--surface2);color:var(--text3)}.sbc:hover{color:var(--error)}

[data-theme="dark"] .drag-handle:hover,[data-theme="dark"] .drag-handle.active{background:var(--usf-gold-bright)}
.drag-handle::after{content:'';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:40px;height:2px;background:var(--surface);border-radius:1px}
.lp{flex:1;overflow-y:auto;padding:24px 28px 40px;min-height:0}.lp::-webkit-scrollbar{width:4px}.lp::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.lb{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.lb.t1{background:var(--tier1bg);color:var(--tier1)}.lb.t2{background:var(--tier2bg);color:var(--tier2)}.lb.t3{background:var(--tier3bg);color:var(--tier3)}
.lt{font-size:20px;font-weight:700;margin-bottom:4px;letter-spacing:-.02em}.ls{font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.ab{display:flex;gap:4px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.ap{padding:4px 10px;border-radius:14px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border:2px solid var(--pill-dim);color:var(--text3);transition:all .3s}
.ap.on{color:var(--step-text);border-color:transparent}
.ap.cs.on{background:var(--c-select)}.ap.cf.on{background:var(--c-from)}.ap.cw.on{background:var(--c-where)}.ap.cg.on{background:var(--c-group)}.ap.ch.on{background:var(--c-having)}.ap.co.on{background:var(--c-order)}
.aa{color:var(--text3);font-size:10px;margin:0 2px}
.stc{background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:14px;overflow:hidden}
.sth{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer}
.stn{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:var(--surface2);color:var(--text3);transition:all .2s;flex-shrink:0}
.stc.on .stn{background:var(--usf-green);color:#fff}[data-theme="dark"] .stc.on .stn{background:var(--usf-gold-bright);color:var(--usf-green-dark)}
.stl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:10px;color:#fff;flex-shrink:0}
.stl.cs{background:var(--c-select)}.stl.cf{background:var(--c-from)}.stl.cw{background:var(--c-where)}.stl.cg{background:var(--c-group)}.stl.ch{background:var(--c-having)}.stl.co{background:var(--c-order)}.stl.ct{background:var(--c-cte)}.stl.cwn{background:var(--c-window)}.stl.csb{background:var(--c-sub)}
.stt{font-size:12px;font-weight:600;color:var(--text)}
.stb{padding:0 16px 14px;display:none}

.std{font-size:11.5px;color:var(--text2);line-height:1.6;margin-bottom:8px}
.sts{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin:8px 0;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text);line-height:1.65;white-space:pre-wrap;cursor:pointer;position:relative;transition:border-color .15s}

.sts::after{content:'Click to run \2192';position:absolute;top:6px;right:10px;font-family:'DM Sans',sans-serif;font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.str{font-size:11px;color:var(--text3);margin-top:4px;font-style:italic}

.sd{border:none;border-top:1px solid var(--border);margin:24px 0}
.hdn{display:none}
.rvl{display:inline-block;padding:4px 12px;border:1px solid var(--border);border-radius:5px;background:transparent;color:var(--text3);font-family:inherit;font-size:10px;font-weight:600;cursor:pointer;margin-top:6px}.rvl:hover{border-color:var(--usf-green);color:var(--usf-green)}[data-theme="dark"] .rvl:hover{border-color:var(--usf-gold-bright);color:var(--usf-gold-bright)}

</style>

function lintSQL(sql){const w=[];let up=sql.toUpperCase().replace(/--[^\n]*/g,'').replace(/'[^']*'/g,"''");if(/\bUNION\b/i.test(up))up=up.split(/\bUNION\b/i)[0];const aggs=/\b(COUNT|SUM|AVG|MIN|MAX)\s*\(/i;const hasGroupBy=/\bGROUP\s+BY\b/i.test(up);const hasAgg=aggs.test(up);if(hasAgg&&!hasGroupBy){const selM=up.match(/\bSELECT\b([\s\S]*?)\bFROM\b/i);if(selM){let cl=selM[1];for(let i=0;i<5;i++)cl=cl.replace(/\b\w+\s*\([^()]*\)/gi,'');cl=cl.replace(/\bCASE\b[\s\S]*?\bEND\b/gi,'').replace(/\bAS\s+\w+/gi,'');const cols=cl.split(',').map(c=>c.trim()).filter(c=>c&&c!=='*'&&!/^\d+$/.test(c)&&!/^'/.test(c)&&c.length>0);if(cols.length>0)w.push('Aggregate function without GROUP BY \u2014 non-aggregated columns may return arbitrary values. Add GROUP BY for each non-aggregated column in SELECT.');}}if(/\bHAVING\b/i.test(up)&&!hasGroupBy)w.push('HAVING without GROUP BY \u2014 HAVING filters grouped results. Did you mean WHERE?');if(/\bWHERE\b/i.test(up)&&hasGroupBy){const wm=up.match(/\bWHERE\b([\s\S]*?)(?:\bGROUP\b)/i);if(wm&&aggs.test(wm[1]))w.push('Aggregate function in WHERE \u2014 aggregates cannot be used in WHERE. Use HAVING instead.');}return w;}

<h3 style="margin:18px 0 10px;font-size:14px">\u2B50 Read the Diagram: Five Steps</h3>

${sc(1,'TABLE','cs','Read a table box',
'Each box is a table. The header is the table name. Inside: column names with types. <strong>PK</strong> (Primary Key) = unique identifier for each row. Every table has one.',
'SELECT *\nFROM members\nLIMIT 5;',
'Confirm: the columns match the diagram. member_id, name, tier, join_date, city, total_points.',true)}

${sc(2,'RELATIONSHIP','cf','Read a relationship line',
'An arrow between two tables means they share a column. <strong>FK</strong> (Foreign Key) = "this column points to a PK in another table." The line from <strong>members</strong> to <strong>transactions</strong> means transactions.member_id references members.member_id.',
'SELECT member_id, txn_date, total_amount\nFROM transactions\nLIMIT 5;',
'member_id is just a number here. The ER line tells you WHERE to look up the name.')}

${sc(3,'CARDINALITY','cf','Read the crow\'s feet',
'Crow\'s foot notation uses symbols at each end of the line. <strong>Double bar ||</strong> = exactly one. <strong>Fork &gt;</strong> = many. <strong>Circle + bar O|</strong> = zero or one (orphans possible). Read it left to right: one member \u2192 many transactions. The fork always points at the "many" table.',
'SELECT member_id, COUNT(*) AS txn_count\nFROM transactions\nWHERE member_id = 42\nGROUP BY member_id;',
'One member, N transactions. The diagram told you this before you wrote the query.')}

${sc(4,'JOIN','cf','Translate a line to SQL',
'Every relationship line IS a JOIN condition. The line from members.member_id \u2192 transactions.member_id translates directly to <code>ON m.member_id = t.member_id</code>. You never have to guess the ON clause \u2014 the diagram tells you.',
'SELECT m.name, m.tier, t.txn_date, t.total_amount\nFROM members m\nINNER JOIN transactions t\n  ON m.member_id = t.member_id\nLIMIT 10;',
'The diagram line became the ON clause. Every JOIN in this course works the same way.')}

${sc(5,'WARNINGS','cw','Read circles and red badges',
'A <strong>circle (O)</strong> on a relationship line means "zero" is possible \u2014 some child rows point to parents that don\'t exist (orphan records). The <strong>dashed line</strong> reinforces this. Compare: the solid double-bar from locations to transactions means every transaction has a valid location. The dashed circle-bar from members to transactions means ~40 transactions have invalid member_ids. <strong>Red badges</strong> flag data quality issues. INNER JOIN drops orphans silently. LEFT JOIN reveals them.',
'SELECT t.txn_id, t.member_id, m.name\nFROM transactions t\nLEFT JOIN members m\n  ON t.member_id = m.member_id\nWHERE m.member_id IS NULL;',
'~40 orphans. The dashed line predicted this. Solid lines (like locations \u2192 transactions) have zero orphans.')}

<div class="co2 k"><strong>Key Takeaway:</strong> Every JOIN you will write in this course comes from a line on this diagram. PK and FK labels tell you the ON clause. Double bars (||) mean every row matches; a circle (O) means orphans exist and INNER JOIN will silently drop rows. The crow\u2019s foot (fork) always points at the \u201Cmany\u201D table. Red badges mark data quality traps.</div>

<div class="pb"><h4>Diagram Exercises</h4><ol>
<li><strong>Trace the path:</strong> How would you get from menu_items to members? Count the crow\u2019s feet you cross. (menu_items \u2192 txn_items \u2192 transactions \u2192 members = 3 JOINs)</li>
<li><strong>Predict the problem:</strong> The line from members to promo_touches has a circle on the members side. What does this mean? What happens with INNER JOIN? (The circle means \u201Czero\u201D is possible \u2014 80 orphan touches disappear silently)</li>
<li><strong>Read the badge:</strong> What does "~25% NULL" on tip_amount mean for an AVG(tip_amount) calculation? (Denominator is smaller than you think)</li>
</ol></div>

<hr class="sd">

<h2 style="font-size:18px;font-weight:700;color:var(--usf-green);margin:20px 0 12px;border-bottom:2px solid var(--border);padding-bottom:8px">Part 2: The Grammar of Data</h2>

${abar(['cs','cf','cw'])}

<div class="cc"><h3>The Query Pattern</h3><p>Every SQL query follows the same structure, clause by clause:</p>
<p><strong style="color:var(--c-select)">SELECT</strong> \u2192 What columns to show (you read these from the table box)<br>
<strong style="color:var(--c-from)">FROM</strong> \u2192 Which table (you pick this from the diagram)<br>
<strong style="color:var(--c-where)">WHERE</strong> \u2192 Which rows to keep (filter on column values)<br>
<strong style="color:var(--c-order)">ORDER BY</strong> \u2192 How to sort the result</p></div>

<h3 style="margin:18px 0 10px;font-size:14px">\u2B50 Build: "Gold members in San Francisco, ranked by points"</h3>

${sc(6,'SELECT','cs','Choose your columns',
'Look at the members box in the ER diagram. Pick the columns you need. SELECT * shows everything; named columns show only what matters.',
'SELECT name, tier, city, total_points\nFROM members\nLIMIT 5;',
'All members, all tiers, all cities \u2014 no filter yet.')}

${sc(7,'WHERE','cw','Filter the rows',
'AND means both conditions must be true. Strings require single quotes. These filter on columns you can see in the diagram.',
"SELECT name, tier, city, total_points\nFROM members\nWHERE tier = 'Gold'\n  AND city = 'San Francisco';",
'Only Gold + San Francisco. Row count drops significantly.')}

${sc(8,'ORDER BY','co','Sort the results',
'DESC = highest first. ASC = lowest first (default).',
"SELECT name, tier, city, total_points\nFROM members\nWHERE tier = 'Gold'\n  AND city = 'San Francisco'\nORDER BY total_points DESC;",
'Same rows, now ranked. The complete query.')}

<hr class="sd">

<h2 style="font-size:18px;font-weight:700;color:var(--usf-green);margin:20px 0 12px;border-bottom:2px solid var(--border);padding-bottom:8px">Part 3: The NULL Trap</h2>

<div class="cc"><h3>Live Demo</h3>
<p>Look at the ER diagram: tip_amount has a red badge saying "~25% NULL." Let's see what that does to our queries.</p></div>

<div class="sxm" onclick="lr(this)">-- Step A: Total transactions
SELECT COUNT(*) AS total_txns FROM transactions;</div>
<div class="sxm" onclick="lr(this)">-- Step B: Transactions with a tip
SELECT COUNT(*) AS tipped
FROM transactions
WHERE tip_amount > 0;</div>

<div class="co2 d"><strong>The ER diagram warned you.</strong> The red "~25% NULL" badge on tip_amount means WHERE tip_amount > 0 evaluates NULL > 0 as UNKNOWN \u2192 treated as FALSE \u2192 rows dropped silently. The diagram is not just a map of tables \u2014 it's a map of traps.</div>

<div class="pb"><h4>Practice</h4><ol>
<li>List all Espresso items sorted by price descending (read columns from menu_items box)</li>
<li>Find mobile transactions over $15 (read columns from transactions box)</li>
<li>Count members who joined in 2024</li>
<li><strong>Diagram challenge:</strong> Write a query joining transactions to locations to show store_name with each transaction. Use the ER diagram to find the ON clause.</li>
</ol></div>`;
}},
'1-2':{t:'Connecting Tables',s:'JOINs link separate tables into one result set.',tier:1,c(){return`
${abar(['cs','cf'])}
<div class="cc"><h3>Why Tables Are Separate</h3><p>"Average spend per loyalty tier?" Tier is in <strong>members</strong>. Spend is in <strong>transactions</strong>. JOIN connects them.</p></div>
<h3 style="margin:18px 0 10px;font-size:14px">\u2B50 Build: "Transactions with member names"</h3>
${sc(1,'FROM','cf','Start with one table','What does a raw transaction row look like?','SELECT *\nFROM transactions\nLIMIT 5;','member_id is just a number. No name.',true)}
${sc(2,'JOIN','cf','Connect to members','INNER JOIN keeps only matched rows. Orphans dropped silently.','SELECT m.name, m.tier, t.txn_date, t.total_amount\nFROM members m\nINNER JOIN transactions t\n  ON m.member_id = t.member_id\nLIMIT 10;','~15,000 rows. Names visible. Orphans excluded.')}
${sc(3,'LEFT JOIN','cf','Preserve unmatched rows','LEFT JOIN keeps ALL left-table rows. NULLs fill the gaps.','SELECT m.name, m.tier, t.txn_id\nFROM members m\nLEFT JOIN transactions t\n  ON m.member_id = t.member_id\nWHERE t.txn_id IS NULL\nLIMIT 20;','Members with no transactions. NULL txn_id = no match.')}
<hr class="sd">
<h3 style="margin:18px 0 10px;font-size:14px">\u2B50 Build: "Find orphan transactions"</h3>
${sc(4,'FROM','cf','Flip the join direction','Now transactions goes LEFT. This finds orders from deleted or invalid accounts.','SELECT t.txn_id, t.member_id, t.total_amount, m.name\nFROM transactions t\nLEFT JOIN members m\n  ON t.member_id = m.member_id\nWHERE m.member_id IS NULL;','~40 orphans. INNER JOIN would silently exclude these from revenue.')}
<div class="co2 d"><strong>~40 orphan transactions.</strong> Deleted accounts? Migration errors? INNER JOIN hides these from every report.</div>
<div class="pb"><h4>Your Turn</h4><ol><li>Show each transaction with its store name (JOIN transactions + locations)</li><li>Find promotions with zero touches (LEFT JOIN + IS NULL)</li></ol></div>`;}},

'2-3':{t:'Aggregation & KPIs',s:'GROUP BY collapses rows into summaries. HAVING filters those summaries.',tier:2,c(){return`
${abar(['cs','cf','cw','cg','ch','co'])}
<div class="co2 w"><strong>AI is now unlocked.</strong> Workflow: prompt \u2192 receive SQL \u2192 read clause by clause \u2192 predict output \u2192 run \u2192 compare.</div>
<h3 style="margin:18px 0 10px;font-size:14px">\u2B50 Build: "Average spend + unique members per tier"</h3>
${sc(1,'SELECT + FROM','cs','Start with raw joined data','Before aggregating, examine one row. What does it represent?','SELECT m.tier, m.member_id, t.total_amount\nFROM members m\nJOIN transactions t ON m.member_id = t.member_id\nLIMIT 10;','One row = one transaction. A Gold member with 10 orders appears 10 times.',true)}
${sc(2,'GROUP BY','cg','Collapse into groups','GROUP BY tier turns thousands of rows into 3 summary rows.','SELECT m.tier,\n       COUNT(*) AS txn_count\nFROM members m\nJOIN transactions t ON m.member_id = t.member_id\nGROUP BY m.tier;','3 rows. But COUNT counts transactions, not unique members.')}
${sc(3,'DISTINCT','cs','Fix the fan-out','COUNT(DISTINCT member_id) counts unique people, not repeated rows.','SELECT m.tier,\n       ROUND(AVG(t.total_amount), 2) AS avg_spend,\n       COUNT(DISTINCT m.member_id) AS unique_members,\n       COUNT(t.txn_id) AS total_txns\nFROM members m\nJOIN transactions t ON m.member_id = t.member_id\nGROUP BY m.tier;','unique_members is correct now. Compare to Step 2.')}
<div class="co2 d"><strong>The DISTINCT Trap:</strong> Without DISTINCT, Gold looks like the biggest segment. It is not \u2014 Gold members just order more often.</div>
<hr class="sd">
<h3 style="margin:18px 0 10px;font-size:14px">\u2B50 Build: "Promo redemption rate per campaign"</h3>
${sc(4,'CASE WHEN','cs','Count conditionally','CASE WHEN inside COUNT isolates a specific response type.','SELECT p.promo_name,\n       COUNT(CASE WHEN pt.response = \'redeemed\' THEN 1 END) AS redemptions,\n       COUNT(pt.touch_id) AS touches\nFROM promotions p\nJOIN promo_touches pt ON p.promo_id = pt.promo_id\nGROUP BY p.promo_name;','20 rows with counts. Now calculate the rate...')}
${sc(5,'1.0 *','cs','Avoid integer division','Without 1.0 *, SQLite does integer division: anything less than 1 becomes 0.','SELECT p.promo_name,\n       COUNT(CASE WHEN pt.response = \'redeemed\' THEN 1 END) AS redemptions,\n       COUNT(pt.touch_id) AS touches,\n       ROUND(1.0 * COUNT(CASE WHEN pt.response = \'redeemed\' THEN 1 END)\n             / COUNT(pt.touch_id), 4) AS rate\nFROM promotions p\nJOIN promo_touches pt ON p.promo_id = pt.promo_id\nGROUP BY p.promo_name\nORDER BY rate DESC;','Remove the 1.0 * and watch every rate drop to 0.')}
<hr class="sd">
<h3 style="margin:18px 0 10px;font-size:14px">\u2B50 Build: "Stores with revenue over $100K"</h3>
${sc(6,'HAVING','ch','Filter AFTER grouping','WHERE filters rows before grouping. HAVING filters groups after aggregation. You cannot put SUM() in WHERE.','SELECT l.store_name,\n       ROUND(SUM(t.total_amount), 2) AS revenue\nFROM locations l\nJOIN transactions t ON l.location_id = t.location_id\nGROUP BY l.store_name\nHAVING SUM(t.total_amount) > 100000\nORDER BY revenue DESC;','Only stores above $100K. Move HAVING to WHERE \u2014 error.')}
<div class="pb"><h4>Your Turn</h4><ol><li>Most popular menu item by total quantity sold</li><li>Monthly transaction count for 2024 (YYYY-MM)</li><li>Revenue per location per month</li></ol></div>`;}},

'2-4':{t:'Subqueries & Comparisons',s:'Nest queries for per-group comparisons and period-over-period analysis.',tier:2,c(){return`
${abar(['cs','cf','cw','cg'])}
<h3 style="margin:18px 0 10px;font-size:14px">\u2B50 Build: "Members with points > 2x their tier average"</h3>
${sc(1,'SUBQUERY','csb','Calculate per-tier averages first','Start with the inner query. This becomes a derived table.','SELECT tier, ROUND(AVG(total_points), 2) AS avg_pts\nFROM members\nGROUP BY tier;','3 rows \u2014 one average per tier. This is the building block.',true)}
${sc(2,'JOIN','cf','Attach averages back to individuals','Wrap Step 1 in parentheses, alias it, JOIN back to members.','SELECT m.name, m.tier, m.total_points, ta.avg_pts\nFROM members m\nJOIN (SELECT tier, ROUND(AVG(total_points), 2) AS avg_pts\n      FROM members GROUP BY tier) ta\n  ON m.tier = ta.tier\nLIMIT 10;','Every member now has their tier average attached.')}
${sc(3,'WHERE','cw','Filter to outliers','Compare each member to 2x their own tier average.','SELECT m.name, m.tier, m.total_points,\n       ta.avg_pts AS tier_avg\nFROM members m\nJOIN (SELECT tier, ROUND(AVG(total_points), 2) AS avg_pts\n      FROM members GROUP BY tier) ta\n  ON m.tier = ta.tier\nWHERE m.total_points > 2 * ta.avg_pts\nORDER BY m.total_points DESC;','Each compared to THEIR tier, not the overall average.')}
<hr class="sd">
<h3 style="margin:18px 0 10px;font-size:14px">\u2B50 Build: "Q3 vs Q4 revenue by order type"</h3>
${sc(4,'CASE WHEN','cs','Create pivot columns','CASE WHEN inside SUM creates side-by-side columns. ELSE 0 prevents NULL.','SELECT order_type,\n  ROUND(SUM(CASE WHEN txn_date BETWEEN \'2024-07-01\' AND \'2024-09-30\'\n      THEN total_amount ELSE 0 END), 2) AS q3,\n  ROUND(SUM(CASE WHEN txn_date BETWEEN \'2024-10-01\' AND \'2024-12-31\'\n      THEN total_amount ELSE 0 END), 2) AS q4\nFROM transactions\nGROUP BY order_type;','Side-by-side comparison. Add a change column as practice.')}
<div class="co2 k"><strong>Any SELECT can be wrapped in parentheses and used as a FROM source.</strong> Think of it as a temporary table that exists only for this query.</div>`;}},

'3-5':{t:'Advanced Patterns',s:'Window functions and CTEs \u2014 built piece by piece.',tier:3,c(){return`
${abar(['cs','cf','cw','cg','co'])}
<div class="co2 w"><strong>Full AI access.</strong> Every query requires annotation: why this structure, errors caught, confidence assessment.</div>
<h3 style="margin:18px 0 10px;font-size:14px">\u2B50 Build: "Rank members by points within each tier"</h3>
${sc(1,'SELECT','cs','Start with base data','Confirm the raw data before adding window functions.','SELECT name, tier, total_points\nFROM members\nORDER BY tier, total_points DESC\nLIMIT 15;','Sorted but no rank number yet.',true)}
${sc(2,'WINDOW','cwn','Add RANK() with PARTITION BY','RANK() OVER (...) adds a column without collapsing rows. PARTITION BY resets per tier.','SELECT name, tier, total_points,\n       RANK() OVER (\n         PARTITION BY tier\n         ORDER BY total_points DESC\n       ) AS tier_rank\nFROM members\nORDER BY tier, tier_rank\nLIMIT 20;','Each tier starts at rank 1. Without PARTITION BY \u2192 global rank.')}
${sc(3,'SUBQUERY','csb','Filter on window result','Cannot WHERE on a window function in the same SELECT. Wrap it.','SELECT * FROM (\n  SELECT name, tier, total_points,\n         NTILE(10) OVER (\n           PARTITION BY tier\n           ORDER BY total_points DESC\n         ) AS decile\n  FROM members\n) ranked\nWHERE decile = 1\nORDER BY tier, total_points DESC;','Top 10% per tier. The Platinum candidate list.')}
<hr class="sd">
<h3 style="margin:18px 0 10px;font-size:14px">\u2B50 Build: "Month-over-month revenue growth"</h3>
${sc(4,'CTE','ct','Step 1 \u2014 Monthly totals','WITH creates a named temporary result set. Build the foundation first.','WITH monthly AS (\n  SELECT strftime(\'%Y-%m\', txn_date) AS month,\n         ROUND(SUM(total_amount), 2) AS revenue\n  FROM transactions\n  WHERE txn_date >= \'2024-01-01\'\n  GROUP BY strftime(\'%Y-%m\', txn_date)\n)\nSELECT * FROM monthly ORDER BY month;','12 rows. One per month. Foundation is set.')}
${sc(5,'WINDOW','cwn','Step 2 \u2014 Add LAG()','LAG(revenue) looks at the previous row. First row is NULL (correct \u2014 no prior month).','WITH monthly AS (\n  SELECT strftime(\'%Y-%m\', txn_date) AS month,\n         ROUND(SUM(total_amount), 2) AS revenue\n  FROM transactions\n  WHERE txn_date >= \'2024-01-01\'\n  GROUP BY strftime(\'%Y-%m\', txn_date)\n)\nSELECT month, revenue,\n       LAG(revenue) OVER (ORDER BY month) AS prev\nFROM monthly ORDER BY month;','prev is NULL for January. Do NOT use a default of 0 (causes division by zero).')}
${sc(6,'SELECT','cs','Step 3 \u2014 Calculate growth %','The complete query.','WITH monthly AS (\n  SELECT strftime(\'%Y-%m\', txn_date) AS month,\n         ROUND(SUM(total_amount), 2) AS revenue\n  FROM transactions\n  WHERE txn_date >= \'2024-01-01\'\n  GROUP BY strftime(\'%Y-%m\', txn_date)\n)\nSELECT month, revenue,\n       LAG(revenue) OVER (ORDER BY month) AS prev_month,\n       ROUND(100.0 * (revenue - LAG(revenue) OVER (ORDER BY month))\n             / LAG(revenue) OVER (ORDER BY month), 1) AS growth_pct\nFROM monthly ORDER BY month;','12 rows. January = NULL. Every other month shows % change.')}
<div class="co2 k"><strong>CTE + Window pattern:</strong> CTE builds summarized data. Window functions compare across rows. Together they handle any time-series analysis.</div>`;}},

'3-6':{t:'Data Quality Audit',s:'Defensive SQL \u2014 find what is broken before it breaks your analysis.',tier:3,c(){return`
${abar(['cs','cf','cw','cg','ch'])}
<div class="cc"><h3>Five Checks for Every Dataset</h3><p>Run these before starting any analysis. The issues you find here determine whether your KPIs are trustworthy.</p></div>
${sc(1,'NULL','cs','Compare two approaches','AVG(COALESCE(x,0)) treats NULLs as zero. AVG(x) excludes NULLs. Both valid \u2014 document your choice.','SELECT\n  ROUND(AVG(COALESCE(tip_amount, 0)), 2) AS avg_nulls_as_zero,\n  ROUND(AVG(tip_amount), 2) AS avg_nulls_excluded,\n  SUM(CASE WHEN tip_amount IS NULL THEN 1 ELSE 0 END) AS null_count,\n  COUNT(*) AS total_rows\nFROM transactions;','Two different averages from the same column. Which do you report?',true)}
${sc(2,'GROUP BY + HAVING','ch','Find duplicates','GROUP BY collapses. HAVING COUNT(*) > 1 keeps only duplicates.','SELECT name, COUNT(*) AS n,\n       GROUP_CONCAT(member_id) AS ids\nFROM members\nGROUP BY name\nHAVING COUNT(*) > 1\nORDER BY n DESC;','~15 duplicate sets.')}
${sc(3,'WHERE','cw','Date anomalies','A promotion cannot start after it ends.','SELECT promo_id, promo_name, start_date, end_date\nFROM promotions\nWHERE start_date > end_date;','Promotion 8. One record, big downstream impact.')}
${sc(4,'LEFT JOIN','cf','Orphan records','Same pattern from Week 2. Here it flags integrity issues.','SELECT COUNT(*) AS orphan_txns\nFROM transactions t\nLEFT JOIN members m ON t.member_id = m.member_id\nWHERE m.member_id IS NULL;','~40 orphans. Revenue that cannot be attributed.')}
${sc(5,'UNION ALL','cs','Complete audit in one query','Combine all checks into a single diagnostic output.','SELECT \'NULL tips\' AS issue,\n       SUM(CASE WHEN tip_amount IS NULL THEN 1 ELSE 0 END) AS count\nFROM transactions\nUNION ALL\nSELECT \'Duplicate members\',\n  (SELECT COUNT(*) FROM (\n    SELECT name FROM members GROUP BY name HAVING COUNT(*) > 1))\nUNION ALL\nSELECT \'Date anomalies\',\n  (SELECT COUNT(*) FROM promotions WHERE start_date > end_date)\nUNION ALL\nSELECT \'Orphan transactions\',\n  (SELECT COUNT(*) FROM transactions t\n   LEFT JOIN members m ON t.member_id = m.member_id\n   WHERE m.member_id IS NULL)\nUNION ALL\nSELECT \'Orphan promo touches\',\n  (SELECT COUNT(*) FROM promo_touches pt\n   LEFT JOIN members m ON pt.member_id = m.member_id\n   WHERE m.member_id IS NULL);','5-row diagnostic. Run this first on any new dataset.')}
<div class="co2 d"><strong>These five issues account for the majority of incorrect KPIs in production analytics.</strong> The audit query should be your first query on any new dataset.</div>`;}},
};

function openSP(){document.querySelectorAll('.nb[data-tier]').forEach(b=>b.classList.remove('a'));document.getElementById('spBtn').classList.add('a');document.getElementById('wbs').innerHTML='';document.getElementById('lp').innerHTML=`<span class="lb" style="background:var(--usf-gold-pale);color:var(--tier2)">Scratchpad</span><h2 class="lt">Free-Form SQL</h2><p class="ls">Write and run any SQL against the Coffee Chain database. No structure, no grading.</p><div class="cc"><h3>Tables</h3><p>members \u2022 transactions \u2022 txn_items \u2022 menu_items \u2022 locations \u2022 promotions \u2022 promo_touches</p></div><div class="sxm" onclick="lr(this)">SELECT * FROM members LIMIT 10;</div><div class="sxm" onclick="lr(this)">SELECT * FROM transactions LIMIT 10;</div><div class="sxm" onclick="lr(this)">SELECT * FROM menu_items;</div><div class="sxm" onclick="lr(this)">SELECT * FROM locations;</div><div class="sxm" onclick="lr(this)">SELECT * FROM promotions;</div>`;}
function rwb(){const c=document.getElementById('wbs');c.innerHTML='';tw[ct].forEach(w=>{const b=document.createElement('button');b.className='wb'+(w===cw?' a':'');b.textContent=`Week ${w}`;b.onclick=()=>selW(w);c.appendChild(b);});}
function selW(w){cw=w;document.querySelectorAll('.wb').forEach(b=>b.classList.toggle('a',b.textContent===`Week ${w}`));rL();}
function rL(){const k=`${ct}-${cw}`,l=L[k];if(!l){document.getElementById('lp').innerHTML='<p style="color:var(--text3);padding:40px;">Coming soon.</p>';return;}document.getElementById('lp').innerHTML=`<span class="lb t${l.tier}">Tier ${l.tier} \u00B7 Week ${cw}</span><h2 class="lt">${l.t}</h2><p class="ls">${l.s}</p>${l.c()}`;}
async function init(){const SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/${f}`});db=new SQL.Database();db.run(SCH);seed(db);rwb();selW(1);}
document.getElementById('ed').addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();run();}if(e.key==='Tab'){e.preventDefault();const t=e.target,s=t.selectionStart;t.value=t.value.substring(0,s)+'  '+t.value.substring(t.selectionEnd);t.selectionStart=t.selectionEnd=s+2;}});
(function(){try{const t=localStorage.getItem('lec_theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('mb').textContent=(document.documentElement.getAttribute('data-theme')||'light')==='dark'?'\u2600\uFE0F':'\uD83C\uDF19';});
// ── Drag handle for resizing SQL panel ──
(function(){
  const handle=document.getElementById('dragHandle'),panel=document.getElementById('sqlPanel');
  let dragging=false,startY=0,startH=0;
  handle.addEventListener('mousedown',e=>{dragging=true;startY=e.clientY;startH=panel.offsetHeight;handle.classList.add('active');document.body.style.cursor='ns-resize';document.body.style.userSelect='none';e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(!dragging)return;const delta=e.clientY-startY;const newH=Math.max(80,Math.min(window.innerHeight*0.7,startH+delta));panel.style.height=newH+'px';});
  document.addEventListener('mouseup',()=>{if(dragging){dragging=false;handle.classList.remove('active');document.body.style.cursor='';document.body.style.userSelect='';}});
  // Touch support
  handle.addEventListener('touchstart',e=>{dragging=true;startY=e.touches[0].clientY;startH=panel.offsetHeight;handle.classList.add('active');e.preventDefault();},{passive:false});
  document.addEventListener('touchmove',e=>{if(!dragging)return;const delta=e.touches[0].clientY-startY;const newH=Math.max(80,Math.min(window.innerHeight*0.7,startH+delta));panel.style.height=newH+'px';},{passive:true});
  document.addEventListener('touchend',()=>{if(dragging){dragging=false;handle.classList.remove('active');}});
})();
init();
</script>
</body>
